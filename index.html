<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Türkiye Rota Pro PWA - Galeri Entegreli</title>

  <link rel="manifest" href="manifest.json">

  <style>
    /* ================= GENEL AYARLAR ================= */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1020;
      color: white;
      -webkit-tap-highlight-color: transparent;
    }

    header {
      position: sticky;
      top: 0;
      background: #111827;
      padding: 15px;
      z-index: 10;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* ================= İLERLEME ÇUBUĞU ================= */
    .bar {
      height: 10px;
      background: #334155;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 8px;
    }

    .fill {
      height: 10px;
      background: #22c55e;
      width: 0%;
      transition: 0.3s;
    }

    /* ================= LİSTE VE ETAPLAR ================= */
    .container {
      padding: 10px;
    }

    .etap {
      margin-bottom: 15px;
      background: #1e293b;
      border-radius: 10px;
      overflow: hidden;
    }

    .etap-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0f172a;
      padding-right: 15px;
    }

    .etap h2 {
      margin: 0;
      padding: 15px;
      cursor: pointer;
      flex: 1;
    }

    /* 🌟 BÜYÜK DEĞİŞİKLİK: !important kaldırıldı, böylece JS ile none/grid yapılabilecek */
    .items {
      display: none; 
      grid-template-columns: repeat(3, 1fr); /* Yan yana tam 3 tane */
      gap: 15px;
      padding: 15px;
    }

    .item {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
      background: #0b1220;
      padding: 10px;
      border-radius: 8px;
      position: relative;
    }

    /* Checkbox'ı resmin üzerine alacak yeni sınıf */
    .chk {
      position: absolute;
      top: 15px;
      right: 15px;
      width: 32px;
      height: 32px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.2);
      z-index: 5;
    }

    .item img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      border-radius: 6px;
      cursor: zoom-in;
      background: #151f32;
    }

    .item img:hover {
      opacity: 0.8;
    }

    small {
      opacity: 0.7;
    }

    /* ================= BUTONLAR VE ROZETLER ================= */
    button {
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .chk {
      background: #bdbdbd;
      color: white;
    }

    .done {
      position: absolute;
      background: #22c55e;
      top: 15px;
      right: 15px;
      width: 32px;
      height: 32px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.2);
      z-index: 5;
    }

    .action-btn {
      background: #475569;
      color: white;
      font-size: 12px;
      margin-left: 4px;
      padding: 4px 8px;
    }

    .btn-red {
      background: #ef4444;
      color: white;
    }

    .badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .badge {
      background: #f59e0b;
      color: black;
      padding: 5px 8px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: bold;
    }

    .modeBtn {
      background: #f59e0b;
      color: black;
    }

    .night {
      background: #050814 !important;
    }

    /* ================= ADMIN PANELİ ================= */
    .admin-panel {
      background: #1e293b;
      padding: 15px;
      border-radius: 8px;
      margin-top: 15px;
      border: 1px dashed #f59e0b;
      display: none;
    }

    .admin-panel input,
    .admin-panel select {
      width: 100%;
      padding: 8px;
      margin: 5px 0 15px 0;
      background: #0f172a;
      color: white;
      border: 1px solid #334155;
      border-radius: 4px;
      box-sizing: border-box;
    }

    .admin-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .admin-card {
      background: #0b1220;
      padding: 10px;
      border-radius: 8px;
    }

    .file-actions {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    .btn-green {
      background: #22c55e;
      color: black;
      width: 100%;
    }

    .btn-blue {
      background: #3b82f6;
      color: white;
      width: 100%;
    }

    .controls {
      display: none;
    }

    .admin-active .controls {
      display: inline-flex;
      gap: 4px;
    }

    /* ================= HARİTA (MAPS) GÖRÜNÜMLERİ ================= */
    .map-container {
      background: #0f172a;
      border-radius: 8px;
      overflow: hidden;
      margin: 10px 0;
      border: 1px solid #334155;
    }

    .map-header {
      background: #f59e0b;
      color: black;
      padding: 8px 12px;
      font-weight: bold;
      font-size: 14px;
    }

    .map-container iframe {
      width: 100%;
      height: 250px;
      border: none;
      display: block;
    }

    .map-btn {
      display: block;
      margin: 8px 0;
      padding: 10px 12px;
      background: #f59e0b;
      color: black;
      text-decoration: none;
      font-weight: bold;
      border-radius: 8px;
      text-align: center;
    }

    /* ================= YENİ GELİŞMİŞ GALERİ MODAL ================= */
    .modal {
      display: none;
      position: fixed;
      z-index: 10000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(3, 5, 11, 0.97);
      backdrop-filter: blur(15px);
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .gallery-container {
      position: relative;
      width: 95vw;
      height: 80vh;
      max-width: 1200px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      width: 100%;
      height: 100%;
      border-radius: 12px;
      object-fit: contain;
      user-select: none;
      transition: transform 0.2s ease;
    }

    .close {
      position: absolute;
      top: 15px;
      right: 25px;
      color: rgba(255, 255, 255, 0.8);
      font-size: 45px;
      font-weight: bold;
      cursor: pointer;
      z-index: 10002;
      transition: color 0.2s, transform 0.2s;
    }

    .close:hover {
      color: #f59e0b;
      transform: scale(1.1);
    }

    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(15, 23, 42, 0.7);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 30px;
      width: 55px;
      height: 55px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10001;
      transition: background 0.2s, color 0.2s;
      user-select: none;
    }

    .nav-btn:hover {
      background: #f59e0b;
      color: black;
    }

    .prev-btn {
      left: 15px;
    }

    .next-btn {
      right: 15px;
    }

    .gallery-info {
      position: absolute;
      bottom: -45px;
      left: 0;
      width: 100%;
      text-align: center;
      font-size: 14px;
      color: #94a3b8;
      background: rgba(15, 23, 42, 0.8);
      padding: 8px 0;
      border-radius: 6px;
    }
    @media (max-width: 1024px) {
  .items {
    grid-template-columns: repeat(2, 1fr);
  }
}

/* mobil */
@media (max-width: 768px) {
  .items {
    grid-template-columns: 1fr;
  }
}
  </style>
</head>

<body>

  <header>
    <div class="topbar">
      <h2>🚗 Rota PRO v2</h2>
      <div>
        <button class="modeBtn" onclick="toggleAdmin()">⚙️ Yönet</button>
        <button class="modeBtn" onclick="toggleMode()">🌙</button>
        <button class="modeBtn" onclick="clearAllData()">🗑️ Komple Sıfırla</button>
<button class="modeBtn" onclick="resetAndReloadJson()">🔄 JSON Yeniden Yükle</button>
      </div>
    </div>

    <div class="admin-panel" id="adminPanel">
      <div class="file-actions">
        <button class="btn-blue" onclick="exportJSON()">📥 JSON İndir</button>
        <button class="btn-blue" onclick="document.getElementById('importFile').click()">📤 JSON Yükle</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
      </div>

      <div class="admin-grid">
        <div class="admin-card">
          <h3 style="margin-top:0; color:#f59e0b;">➕ Otomatik Etap Ekle</h3>
          <label>Etap Adı:</label>
          <input type="text" id="newEtapName" placeholder="Örn: 1. Etap Ege">
          <label>Google Maps Yol Tarifi Linki (Uzun URL):</label>
          <input type="text" id="newEtapMap" placeholder="https://www.google.com/maps/dir/Durak1/Durak2/...">
          <button class="btn-green" onclick="addEtap()">Etap ve Durakları Oluştur</button>
        </div>

        <div class="admin-card">
          <h3 style="margin-top:0; color:#f59e0b;">📍 Manuel Durak Ekle</h3>
          <label>Hangi Etaba?</label>
          <select id="etapSelect"></select>
          <label>Durak Adı:</label>
          <input type="text" id="newPlaceName" placeholder="Örn: Bademli Koyu">
          <button class="btn-green" onclick="addPlace()">Durağı Ekle</button>
        </div>
      </div>
      <p style="font-size:12px; color:#94a3b8; margin-top:15px;">* "Yönet" modundayken öğeleri silebilir veya sıralayabilirsiniz. Uzun yön tarifi linki eklerseniz duraklar otomatik çekilir.</p>
    </div>

    Genel İlerleme
    <div class="bar">
      <div class="fill" id="global"></div>
    </div>
    <div class="badges" id="badges"></div>
  </header>

  <div class="container" id="app"></div>

  <div id="imageModal" class="modal" onclick="closeModal()">
    <span class="close" onclick="closeModal()">×</span>
    <div class="gallery-container" onclick="event.stopPropagation()">
      <div class="nav-btn prev-btn" onclick="changeImage(-1)">❮</div>
      <img class="modal-content" id="modalImg" alt="Galeri Görseli">
      <div class="nav-btn next-btn" onclick="changeImage(1)">❯</div>
      <div class="gallery-info" id="galleryInfo">Yükleniyor...</div>
    </div>
  </div>

  <script>
    /* ================= DATA MANAGEMENT ================= */
    let data = [];
    let isAdmin = false;

    let imageCache = JSON.parse(localStorage.getItem("pro_route_gallery_cache") || "{}");
    let pendingFetches = new Set();

    let currentGalleryImages = [];
    let currentImageIndex = 0;
    let currentActivePlace = "";

    async function initApp() {
      const localData = localStorage.getItem("pro_route_data");

      if (localData) {
        data = JSON.parse(localData);
        startUI();
      } else {
        try {
          const response = await fetch("pro_route_data.json");
          if (response.ok) {
            data = await response.json();
            saveData();
          } else {
            loadFallbackData();
          }
        } catch (error) {
          loadFallbackData();
        }
      }
    }

    function loadFallbackData() {
      data = [
        {
          id: Date.now(),
          name: "İç Anadolu Turu",
          mapLinks: [{ title: "Ankara Gezi Rotası", url: "http://maps.google.com" }],
          places: ["Ankara Kalesi", "Anıtkabir", "Efes Antik Kenti"]
        }
      ];
      saveData();
    }

    function startUI() {
      updateEtapSelect();
      render();
    }

    function saveData() {
      localStorage.setItem("pro_route_data", JSON.stringify(data));
      updateEtapSelect();
      render();
    }

    function exportJSON() {
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data, null, 2));
      const downloadAnchorNode = document.createElement('a');
      downloadAnchorNode.setAttribute("href", dataStr);
      downloadAnchorNode.setAttribute("download", "pro_route_data.json");
      document.body.appendChild(downloadAnchorNode);
      downloadAnchorNode.click();
      downloadAnchorNode.remove();
    }

    function importJSON(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function (e) {
        try {
          const importedData = JSON.parse(e.target.result);
          if (Array.isArray(importedData)) {
            data = importedData;
            saveData();
            alert("Rota JSON dosyasından başarıyla yüklendi!");
          }
        } catch (err) {
          alert("Hatalı JSON dosyası!");
        }
      };
      reader.readAsText(file);
    }

    /* ================= AKILLI ÇOKLU FOTOĞRAF MOTORU ================= */
    function getActualPlaceImages(placeName, imgElementId) {
      if (imageCache[placeName] && imageCache[placeName].length > 0) {
        return imageCache[placeName][0];
      }

      if (pendingFetches.has(placeName)) {
        return "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23151f32'/></svg>";
      }

      pendingFetches.add(placeName);
      let cleanName = placeName.split(',')[0].split('/')[0].split('(')[0].trim();

      const commonsUrl = `https://commons.wikimedia.org/w/api.php?action=query&generator=search&gsrsearch=${encodeURIComponent(cleanName)}&gsrnamespace=6&gsrlimit=5&prop=imageinfo&iiprop=url&format=json&origin=*`;

      fetch(commonsUrl)
        .then(res => res.json())
        .then(json => {
          let collectedImages = [];

          if (json.query && json.query.pages) {
            const pages = json.query.pages;
            for (let pageId in pages) {
              if (pages[pageId].imageinfo && pages[pageId].imageinfo.length > 0) {
                collectedImages.push(pages[pageId].imageinfo[0].url);
              }
            }
          }

          if (collectedImages.length === 0) {
            const trWikiUrl = `https://tr.wikipedia.org/w/api.php?action=query&prop=pageimages&format=json&piprop=thumbnail&pithumbsize=1000&titles=${encodeURIComponent(cleanName)}&origin=*`;
            return fetch(trWikiUrl)
              .then(res => res.json())
              .then(trJson => {
                if (trJson.query && trJson.query.pages) {
                  const trPages = trJson.query.pages;
                  const trPageId = Object.keys(trPages)[0];
                  if (trPageId !== "-1" && trPages[trPageId].thumbnail) {
                    collectedImages.push(trPages[trPageId].thumbnail.source);
                  }
                }
                return collectedImages;
              });
          }

          return collectedImages;
        })
        .then(collectedImages => {
          if (collectedImages.length === 0) {
            collectedImages.push("https://upload.wikimedia.org/wikipedia/commons/a/ac/No_image_available.svg");
          }

          imageCache[placeName] = collectedImages;
          localStorage.setItem("pro_route_image_cache", JSON.stringify(imageCache));

          const el = document.getElementById(imgElementId);
          if (el && collectedImages.length > 0) {
            el.src = collectedImages[0];
          }
        })
        .catch(() => {
          let fallbackList = ["https://upload.wikimedia.org/wikipedia/commons/a/ac/No_image_available.svg"];
          imageCache[placeName] = fallbackList;
          localStorage.setItem("pro_route_image_cache", JSON.stringify(imageCache));
          const el = document.getElementById(imgElementId);
          if (el) el.src = fallbackList[0];
        });

      return "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23151f32'/></svg>";
    }

    /* ================= GALERİ MODAL KONTROLLERİ ================= */
    function openModal(placeName) {
      currentActivePlace = placeName;

      if (imageCache[placeName] && imageCache[placeName].length > 0) {
        currentGalleryImages = imageCache[placeName];
      } else {
        currentGalleryImages = ["https://upload.wikimedia.org/wikipedia/commons/a/ac/No_image_available.svg"];
      }

      currentImageIndex = 0;

      const modal = document.getElementById("imageModal");
      modal.style.display = "flex";
      document.body.style.overflow = "hidden";

      updateModalImage();
    }

    function updateModalImage() {
      const modalImg = document.getElementById("modalImg");
      const infoText = document.getElementById("galleryInfo");

      if (currentGalleryImages.length > 0) {
        modalImg.src = currentGalleryImages[currentImageIndex];
        infoText.innerText = `${currentActivePlace} — Görsel ${currentImageIndex + 1} / ${currentGalleryImages.length}`;
      }
    }

    function changeImage(step) {
      currentImageIndex += step;
      if (currentImageIndex >= currentGalleryImages.length) currentImageIndex = 0;
      if (currentImageIndex < 0) currentImageIndex = currentGalleryImages.length - 1;
      updateModalImage();
    }

    function closeModal() {
      document.getElementById("imageModal").style.display = "none";
      document.body.style.overflow = "";
    }
/* ================= LOCAL STORAGE MANIPULATION ================= */
    // 1. Komple Sıfırla: LocalStorage'daki her şeyi temizler ve uygulamayı sıfırdan başlatır
    function clearAllData() {
      if (confirm("DİKKAT: Tüm rota verileriniz, ilerlemeniz ve görsel önbelleğiniz tamamen silinecek. Emin misiniz?")) {
        localStorage.clear();
        alert("Tüm veriler temizlendi! Sayfa yeniden yüklenecek.");
       // 2. push() fonksiyonunun patlamaması için BOŞ BİR DİZİ (ARRAY) set et
    localStorage.setItem("pro_route_data", JSON.stringify([]));
        location.reload();
      }
    }

    // 2. JSON Yeniden Yükle: Rota verilerini siler ve orijinal pro_route_data.json dosyasını tekrar çeker
    async function resetAndReloadJson() {
      if (confirm("Mevcut rotalarınız ve değişiklikleriniz silinecek, orijinal JSON verileri yeniden yüklenecek. Emin misiniz?")) {
        try {
          // Sadece rota verisini temizliyoruz (İstersen görsel cache'i kalsın diye sadece bunu sildim)
          localStorage.removeItem("pro_route_data");
          
          // Orijinal dosyaya istek atıyoruz
          const response = await fetch("pro_route_data.json");
          
          if (response.ok) {
            data = await response.json();
            saveData(); // İçerisinde localStorage.setItem, updateEtapSelect ve render barındırıyor.
            alert("Orijinal rota verileri başarıyla yeniden yüklendi!");
          } else {
            alert("pro_route_data.json dosyası sunucuda bulunamadı veya yüklenemedi!");
            initApp(); // Hata durumunda uygulamayı güvenli moda (fallback) düşürmesi için tetikliyoruz
          }
        } catch (error) {
          console.error("Yeniden yükleme hatası:", error);
          alert("Bir hata oluştu: " + error.message);
          initApp();
        }
      }
    }
    document.addEventListener('keydown', function (event) {
      if (document.getElementById("imageModal").style.display === "flex") {
        if (event.key === "Escape") closeModal();
        if (event.key === "ArrowRight") changeImage(1);
        if (event.key === "ArrowLeft") changeImage(-1);
      }
    });

    let touchStartX = 0;
    let touchEndX = 0;
    const modalZone = document.getElementById("imageModal");

    modalZone.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, false);
    modalZone.addEventListener('touchend', e => {
      touchEndX = e.changedTouches[0].screenX;
      handleSwipe();
    }, false);

    function handleSwipe() {
      if (touchEndX < touchStartX - 50) changeImage(1);
      if (touchEndX > touchStartX + 50) changeImage(-1);
    }

    /* ================= MAPS URL PARSING LOGIC ================= */
    function extractPlacesFromUrl(url) {
      try {
        if (!url.includes('/dir/')) return [];
        let afterDir = url.split('/dir/')[1];
        if (afterDir.includes('/@')) afterDir = afterDir.split('/@')[0];
        if (afterDir.includes('/data=')) afterDir = afterDir.split('/data=')[0];
        if (afterDir.includes('?')) afterDir = afterDir.split('?')[0];

        const rawPlaces = afterDir.split('/');
        const cleanPlaces = rawPlaces
          .map(p => decodeURIComponent(p.replace(/\+/g, ' ')).trim())
          .filter(p => p !== '' && !p.startsWith('data=') && !p.startsWith('am='));

        return cleanPlaces.map(p => {
          if (/^-?\d+(\.\d+)?,-?\d+(\.\d+)?$/.test(p)) return "İsimsiz Nokta (Koordinat)";
          return p;
        });
      } catch (e) {
        return [];
      }
    }

    /* ================= CRUD OPERATIONS ================= */
    function toggleAdmin() {
      isAdmin = !isAdmin;
      document.getElementById("adminPanel").style.display = isAdmin ? "block" : "none";
      document.body.classList.toggle("admin-active", isAdmin);
    }

    function addEtap() {
      const name = document.getElementById("newEtapName").value.trim();
      const mapUrl = document.getElementById("newEtapMap").value.trim();
      if (!name) { alert("Etap adı boş olamaz!"); return; }

      let autoPlaces = [];
      if (mapUrl) autoPlaces = extractPlacesFromUrl(mapUrl);

      const newEtap = {
        id: Date.now(),
        name: name,
        mapLinks: mapUrl ? [{ title: name + " Haritası", url: mapUrl }] : [],
        places: autoPlaces
      };

      data.push(newEtap);
      document.getElementById("newEtapName").value = "";
      document.getElementById("newEtapMap").value = "";
      saveData();
    }

    function addPlace() {
      const etapIndex = document.getElementById("etapSelect").value;
      const placeName = document.getElementById("newPlaceName").value.trim();
      if (etapIndex === "" || !placeName) return;

      data[etapIndex].places.push(placeName);
      document.getElementById("newPlaceName").value = "";
      saveData();
    }

    function updateEtapSelect() {
      const select = document.getElementById("etapSelect");
      select.innerHTML = "";
      data.forEach((e, i) => {
        const opt = document.createElement("option");
        opt.value = i; opt.innerText = e.name; select.appendChild(opt);
      });
    }

    function moveEtap(index, direction) {
      if (index + direction < 0 || index + direction >= data.length) return;
      const temp = data[index]; data[index] = data[index + direction]; data[index + direction] = temp;
      saveData();
    }

    function deleteEtap(index) {
      if (confirm("Etabı silmek istediğine emin misin?")) { data.splice(index, 1); saveData(); }
    }

    function movePlace(etapIndex, placeIndex, direction) {
      const places = data[etapIndex].places;
      if (placeIndex + direction < 0 || placeIndex + direction >= places.length) return;
      const temp = places[placeIndex]; places[placeIndex] = places[placeIndex + direction]; places[placeIndex + direction] = temp;
      saveData();
    }

    function deletePlace(etapIndex, placeIndex) {
      data[etapIndex].places.splice(placeIndex, 1);
      saveData();
    }

    /* ================= STORAGE UTILS & PROGRESS ================= */
    function key(e, p) { return "x_" + e + "_" + p; }
    function get(k) { return localStorage.getItem(k) === "1"; }
    function set(k, v) { localStorage.setItem(k, v ? "1" : "0"); }

    function progress() {
      let t = 0, d = 0;
      data.forEach((e, i) => { e.places.forEach(p => { t++; if (get(key(i, p))) d++; }); });
      return t ? Math.round((d / t) * 100) : 0;
    }

    function etapProgress(i) {
      let t = 0, d = 0; if (!data[i] || !data[i].places) return 0;
      data[i].places.forEach(p => { t++; if (get(key(i, p))) d++; });
      return t ? Math.round((d / t) * 100) : 0;
    }

    /* ================= UI RENDER ================= */
/* ================= UI RENDER ================= */
function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  data.forEach((e, i) => {
    const box = document.createElement("div");
    box.className = "etap";

    box.innerHTML = `
      <div class="etap-header">
        <h2 onclick="toggleEtap(this)">${e.name} - %${etapProgress(i)}</h2>
        <div class="controls">
          <button class="action-btn" onclick="moveEtap(${i}, -1)">⬆️</button>
          <button class="action-btn" onclick="moveEtap(${i}, 1)">⬇️</button>
          <button class="action-btn btn-red" onclick="deleteEtap(${i})">❌</button>
        </div>
      </div>
      <div class="etap-btns" style=" padding: 10px 15px 0 15px; display: none; flex-direction: column; gap: 10px;"></div>
      <div class="items"></div>
    `;

    const etapBtns = box.querySelector(".etap-btns");
    const items = box.querySelector(".items");

    // 1. Harita Linkleri
    if (e.mapLinks && e.mapLinks.length > 0) {
      e.mapLinks.forEach(link => {
        if (link.url.includes("embed")) {
          const mapDiv = document.createElement("div");
          mapDiv.className = "map-container";
          mapDiv.innerHTML = `<div class="map-header">🗺️ ${link.title}</div><iframe src="${link.url}" allowfullscreen="" loading="lazy"></iframe>`;
          etapBtns.appendChild(mapDiv);
        } else {
          const btnUrl = document.createElement("a");
          btnUrl.className = "map-btn"; 
          btnUrl.href = link.url; 
          btnUrl.target = "_blank";
          btnUrl.innerText = `🗺️ ${link.title} (Haritada Aç)`;
          etapBtns.appendChild(btnUrl);
        }
      });
    }

    // 2. ASİSTAN PANELİ
    const assistantContainer = document.createElement("div");
    assistantContainer.style.cssText = "margin:5px 0; display:grid; grid-template-columns:1fr 1fr; gap:8px;";

    const services = [
      { label: "Otel", query: "oteller" },
      { label: "Eczane", query: "eczaneler" },
      { label: "Market", query: "marketler" },
      { label: "Benzinlik", query: "akaryakıt istasyonu" },
      { label: "Kafe", query: "kafeler" },
      { label: "Restoran", query: "restoranlar" },
      { label: "Hastane", query: "hastaneler" },
      { label: "Kamp", query: "kamp alanları" },
    ];

    services.forEach(s => {
      const sBtn = document.createElement("button");
      sBtn.className = "action-btn";
      sBtn.style.padding = "10px";
      sBtn.style.background = "#22c55e";
      sBtn.style.color = "black";
      sBtn.innerText = `🔍 ${s.label} Ara`;
      sBtn.onclick = () => {
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            const query = encodeURIComponent(s.query);
            // KANKA NOT: Eski googleusercontent linkini, çalışan resmi Google Maps arama linkine çevirdim.
            const url = `https://www.google.com/maps/search/${query}/@${lat},${lng},14z`;
            window.open(url, "_blank");
          },
          () => {
            alert("Konum alınamadı.");
          }
        );
      };
      assistantContainer.appendChild(sBtn);
    });
    etapBtns.appendChild(assistantContainer);

    if (etapBtns.children.length === 0) {
      etapBtns.style.padding = "0";
    }

    // 3. Duraklar
    e.places.forEach((p, pIndex) => {
      const k = key(i, p);
      const div = document.createElement("div");
      div.className = "item";
      const imgId = `img_${i}_${pIndex}`;
      const imgUrl = (imageCache[p] && imageCache[p].length > 0) ? imageCache[p][0] : getActualPlaceImages(p, imgId);

      // KANKA NOT: İstediğin gibi adresi ilk virgüle göre parçalayıp kısa ismi aldık
      const shortName = p.includes(',') ? p.split(',')[0].trim() : p;

      div.innerHTML = `
        <img id="${imgId}" src="${imgUrl}" alt="${shortName}" onclick="openModal('${p.replace(/'/g, "\\'")}')" />
        <div style="flex:1">
          <b>${shortName}</b><br/>
          <div class="controls" style="margin-top:5px;">
            <button class="action-btn" onclick="movePlace(${i}, ${pIndex}, -1)">⬆️</button>
            <button class="action-btn" onclick="movePlace(${i}, ${pIndex}, 1)">⬇️</button>
            <button class="action-btn btn-red" onclick="deletePlace(${i}, ${pIndex})">❌</button>
          </div>
        </div>
        <button class="${get(k) ? 'done' : 'chk'}" onclick="toggleCheck('${k}')">
          ${get(k) ? "✔" : "⬜"}
        </button>
      `;
      items.appendChild(div);
    });

    app.appendChild(box);
  });

  document.getElementById("global").style.width = progress() + "%";
  renderBadges();
}
    function renderBadges() {
      const b = document.getElementById("badges"); b.innerHTML = "";
      data.forEach((e, i) => {
        if (etapProgress(i) === 100 && e.places.length > 0) {
          const s = document.createElement("div"); s.className = "badge"; s.innerText = "🏆 " + e.name + " bitti"; b.appendChild(s);
        }
      });
      if (progress() === 100 && data.length > 0) {
        const s = document.createElement("div"); s.className = "badge"; s.innerText = "👑 TÜRKİYE MASTER"; b.appendChild(s);
      }
    }

    function toggleCheck(k) { set(k, !get(k)); render(); }

    /* 🌟 BÜYÜK DEĞİŞİKLİK: toggleEtap artık hem .etap-btns hem de .items alanlarını güvenli kapatır ve açıldığında display: grid yapar */
    function toggleEtap(el) {
      const etapBox = el.closest('.etap');
      const btns = etapBox.querySelector('.etap-btns');
      const items = etapBox.querySelector('.items');

      if (items.style.display === "none") {
        items.style.display = "grid"; // Açıldığında tekrar grid tasarımına sadık kalır
        if (btns) btns.style.display = "flex";
      } else {
        items.style.display = "none";  // Kapandığında tamamen gizlenir
        if (btns) btns.style.display = "none";
      }
    }
    
    function toggleMode() { document.body.classList.toggle("night"); }

    /* ================= BAŞLAT ================= */
    initApp();
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register(URL.createObjectURL(new Blob([`
        self.addEventListener('install',e=>self.skipWaiting());
        self.addEventListener('fetch',()=>{});
      `], { type: "text/javascript" })));
    }
  </script>

</body>
